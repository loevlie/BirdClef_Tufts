base: configs/base.yaml

# V18 — incorporating techniques from the 0.926 Pantanal Distill notebook

proto_ssm:
  d_model: 320
  d_state: 32
  n_ssm_layers: 4
  dropout: 0.12
  n_prototypes: 2
  n_sites: 20
  meta_dim: 24
  use_cross_attn: true
  cross_attn_heads: 8

proto_ssm_train:
  n_epochs: 40
  lr: 8.0e-4
  weight_decay: 1.0e-3
  val_ratio: 0.15
  patience: 8
  pos_weight_cap: 25.0
  distill_weight: 0.15
  proto_margin: 0.15
  label_smoothing: 0.03
  oof_n_splits: 5
  mixup_alpha: 0.4
  focal_gamma: 2.5
  swa_start_frac: 0.65
  swa_lr: 4.0e-4

fusion:
  lambda_event: 0.45
  lambda_texture: 1.1
  lambda_proxy_texture: 0.9
  smooth_texture: 0.35
  smooth_event: 0.15

residual_ssm:
  d_model: 128
  d_state: 16
  n_ssm_layers: 2
  dropout: 0.1
  correction_weight: 0.35
  n_epochs: 40
  lr: 8.0e-4
  patience: 12

tta_shifts: [0, 1, -1]
file_level_top_k: 2
rank_aware_scale: true
rank_aware_power: 0.4
delta_shift_alpha: 0.20

probe:
  backend: mlp
  pca_dim: 128
  min_pos: 5
  C: 0.75
  alpha: 0.45
  mlp:
    hidden_layer_sizes: [256, 128]
    activation: relu
    max_iter: 500
    early_stopping: true
    validation_fraction: 0.15
    n_iter_no_change: 20
    learning_rate_init: 5.0e-4
    l2_alpha: 0.005
